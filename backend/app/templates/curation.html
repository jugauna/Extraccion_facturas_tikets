<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Curación — Autodoc v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 600: '#0e7490', 700: '#0f766e' } } } } }
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <header class="bg-white border-b border-slate-200 shadow-sm">
    <div class="max-w-[1600px] mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-2">
      <div>
        <h1 class="text-lg font-semibold text-slate-800">Validación de extracción</h1>
        <p class="text-sm text-slate-500">{{ filename }} · Batch {{ batch_id }}</p>
      </div>
      <span class="inline-flex items-center gap-1 rounded-full bg-teal-50 text-teal-800 text-xs font-medium px-3 py-1 border border-teal-200">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z"/></svg>
        Procesado con IA — revisá y corregí antes de guardar
      </span>
    </div>
  </header>

  <main class="max-w-[1600px] mx-auto p-4 flex flex-col lg:flex-row gap-4 min-h-[calc(100vh-5rem)]">
    <!-- Visor documento (izquierda) -->
    <section class="lg:w-[52%] flex flex-col bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-3 py-2 border-b border-slate-100 bg-slate-50 text-sm font-medium text-slate-600">Documento original</div>
      <div class="flex-1 overflow-auto p-3 bg-slate-800/5 flex items-start justify-center min-h-[320px]">
        <img src="data:{{ preview_mime }};base64,{{ preview_base64 }}" alt="Vista previa del comprobante" class="max-w-full h-auto rounded-lg shadow-md border border-slate-200" />
      </div>
      {% if drive_link %}
      <div class="px-3 py-2 border-t border-slate-100 text-xs">
        <a href="{{ drive_link }}" target="_blank" rel="noopener" class="text-brand-700 hover:underline">Abrir en Google Drive ↗</a>
      </div>
      {% endif %}
    </section>

    <!-- Formulario (derecha) -->
    <section class="lg:flex-1 flex flex-col gap-3 min-w-0">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 flex-1 flex flex-col min-h-0">
        <h2 class="text-sm font-semibold text-slate-700 mb-3">Filas contables (22 columnas por fila)</h2>
        <div id="rows-root" class="space-y-6 overflow-y-auto flex-1 pr-1"></div>
        <div class="mt-4 flex flex-wrap gap-2 pt-3 border-t border-slate-100">
          <button type="button" id="btn-add-row" class="px-3 py-2 text-sm font-medium rounded-lg border border-slate-300 bg-white hover:bg-slate-50 text-slate-700">+ Agregar fila</button>
          <button type="button" id="btn-save" class="px-4 py-2 text-sm font-semibold rounded-lg bg-brand-700 text-white hover:bg-brand-600 shadow-sm">Guardar en gold dataset</button>
        </div>
        <p id="status-msg" class="mt-2 text-sm min-h-[1.25rem]" role="status"></p>
      </div>
    </section>
  </main>

  <script>
    const TASK_ID = {{ task_id | tojson }};
    const TOKEN = {{ token | tojson }};
    const COLUMNS = {{ columns | tojson }};
    const LABELS = {{ labels | tojson }};
    let rowsState = {{ initial_rows | tojson }};

    function escAttr(s) {
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function rowFieldsHtml(rowIndex, row) {
      const wrap = document.createElement('div');
      wrap.className = 'border border-slate-200 rounded-lg p-3 bg-slate-50/50';
      wrap.dataset.rowIndex = String(rowIndex);
      let h = '<div class="flex justify-between items-center mb-2"><span class="text-xs font-semibold text-slate-500">Fila ' + (rowIndex + 1) + '</span>';
      if (rowsState.length > 1) {
        h += '<button type="button" class="text-xs text-red-600 hover:underline btn-del-row">Eliminar fila</button>';
      }
      h += '</div><div class="grid grid-cols-1 sm:grid-cols-2 gap-2">';
      for (const col of COLUMNS) {
        const v = (row && row[col] != null) ? String(row[col]) : '';
        const lab = LABELS[col] || col;
        const id = 'f_' + rowIndex + '_' + col.replace(/[^a-zA-Z0-9]/g, '_');
        h += '<label class="block text-xs"><span class="text-slate-500">' + escAttr(lab) + '</span><input data-col="' + escAttr(col) + '" class="mt-0.5 w-full border border-slate-300 rounded px-2 py-1.5 text-sm" id="' + id + '" value="' + escAttr(v) + '" /></label>';
      }
      h += '</div>';
      wrap.innerHTML = h;
      wrap.querySelector('.btn-del-row')?.addEventListener('click', () => {
        rowsState.splice(rowIndex, 1);
        renderAll();
      });
      return wrap;
    }

    function readRowFromDom(rowIndex) {
      const wrap = document.querySelector('[data-row-index="' + rowIndex + '"]');
      if (!wrap) return {};
      const o = {};
      wrap.querySelectorAll('input[data-col]').forEach((inp) => {
        o[inp.getAttribute('data-col')] = inp.value;
      });
      return o;
    }

    function renderAll() {
      const root = document.getElementById('rows-root');
      root.innerHTML = '';
      rowsState.forEach((row, i) => {
        root.appendChild(rowFieldsHtml(i, row));
      });
    }

    function emptyRow() {
      const o = {};
      COLUMNS.forEach((c) => { o[c] = ''; });
      o['Cantidad'] = '1';
      return o;
    }

    document.getElementById('btn-add-row').addEventListener('click', () => {
      const idx = rowsState.length;
      if (idx > 0) rowsState.push(readRowFromDom(idx - 1));
      else rowsState.push(emptyRow());
      renderAll();
    });

    document.getElementById('btn-save').addEventListener('click', async () => {
      const msg = document.getElementById('status-msg');
      msg.textContent = '';
      const collected = [];
      document.querySelectorAll('#rows-root > div[data-row-index]').forEach((el) => {
        const i = parseInt(el.getAttribute('data-row-index'), 10);
        collected[i] = readRowFromDom(i);
      });
      const rows = collected.filter(Boolean);
      msg.textContent = 'Guardando…';
      try {
        const res = await fetch('/curation/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task_id: TASK_ID, token: TOKEN, rows }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          msg.textContent = data.detail || ('Error ' + res.status);
          msg.className = 'mt-2 text-sm text-red-600';
          return;
        }
        msg.textContent = data.message || 'Guardado correctamente. Podés cerrar esta ventana.';
        msg.className = 'mt-2 text-sm text-teal-700';
        document.getElementById('btn-save').disabled = true;
      } catch (e) {
        msg.textContent = 'Error de red: ' + e.message;
        msg.className = 'mt-2 text-sm text-red-600';
      }
    });

    if (!rowsState || !rowsState.length) rowsState = [emptyRow()];
    renderAll();
  </script>
</body>
</html>
