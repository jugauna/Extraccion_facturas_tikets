<!--
  Autodoc v2 — Módulo Código Divi (WordPress)
  FormData: "images" (repetido), "user_notes" y "batch_id" opcionales.

  Si ves "Failed to fetch" = CORS: el navegador exige que n8n permita tu dominio.
  En el servidor n8n (Docker / panel Hostinger) agregá variable de entorno, por ejemplo:
    N8N_CORS_ALLOW_ORIGIN=https://TU-SITIO-WORDPRESS.com
  Para pruebas rápidas (menos seguro): N8N_CORS_ALLOW_ORIGIN=*
  Reiniciá n8n después de cambiar .env.

  webhook-test = pruebas en el editor. En producción con flujo ACTIVO usá:
  https://n8n.srv1392353.hstgr.cloud/webhook/autodoc-multi-ticket
-->
<div id="autodoc-rendiciones" class="autodoc-wrap">
  <form id="autodoc_form" class="autodoc-form">
    <label for="ticket_files">Seleccionar tickets (imágenes o PDF)</label>
    <input
      type="file"
      id="ticket_files"
      name="ticket_files"
      multiple
      accept="image/*,application/pdf"
      required
    />

    <label for="user_notes">Notas (opcional)</label>
    <textarea id="user_notes" name="user_notes" rows="3" placeholder="Observaciones sobre el lote o archivos"></textarea>

    <button type="submit" id="autodoc_submit">Enviar a Rendiciones</button>
  </form>

  <div id="autodoc_status" class="autodoc-status" aria-live="polite"></div>
  <div class="autodoc-progress-wrap" hidden>
    <label for="autodoc_progress">Procesando tickets con Inteligencia Artificial…</label>
    <progress id="autodoc_progress" max="100" value="0"></progress>
  </div>
</div>

<style>
  .autodoc-wrap { max-width: 560px; margin: 1rem auto; font-family: system-ui, sans-serif; }
  .autodoc-form label { display: block; margin-top: 0.75rem; font-weight: 600; }
  .autodoc-form input[type="file"], .autodoc-form textarea { width: 100%; margin-top: 0.25rem; }
  .autodoc-form button { margin-top: 1rem; padding: 0.6rem 1.2rem; cursor: pointer; }
  .autodoc-status { min-height: 1.5rem; margin-top: 0.75rem; color: #333; }
  .autodoc-status.error { color: #b91c1c; }
  .autodoc-status.ok { color: #0f766e; }
  .autodoc-progress-wrap { margin-top: 1rem; }
  .autodoc-progress-wrap progress { width: 100%; height: 1rem; }
  #autodoc_submit:disabled { opacity: 0.6; cursor: not-allowed; }
</style>

<script>
(function () {
  const N8N_WEBHOOK_URL = 'https://n8n.srv1392353.hstgr.cloud/webhook-test/autodoc-multi-ticket';

  const form = document.getElementById('autodoc_form');
  const input = document.getElementById('ticket_files');
  const notesEl = document.getElementById('user_notes');
  const statusEl = document.getElementById('autodoc_status');
  const btn = document.getElementById('autodoc_submit');
  const progWrap = document.querySelector('.autodoc-progress-wrap');
  const prog = document.getElementById('autodoc_progress');

  function setStatus(msg, cls) {
    statusEl.textContent = msg || '';
    statusEl.className = 'autodoc-status' + (cls ? ' ' + cls : '');
  }

  function indeterminateProgress(on) {
    progWrap.hidden = !on;
    if (on) {
      prog.removeAttribute('value');
    } else {
      prog.value = 0;
    }
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    setStatus('', null);
    const files = input.files ? Array.from(input.files) : [];
    if (!files.length) {
      setStatus('Seleccioná al menos un archivo.', 'error');
      return;
    }

    const fd = new FormData();
    files.forEach(function (f) {
      fd.append('images', f, f.name);
    });
    const un = (notesEl && notesEl.value) ? notesEl.value.trim() : '';
    if (un) {
      fd.append('user_notes', un);
    }
    fd.append('batch_id', crypto.randomUUID ? crypto.randomUUID() : String(Date.now()));

    btn.disabled = true;
    indeterminateProgress(true);

    const ctrl = new AbortController();
    const slowMsg = window.setTimeout(function () {
      setStatus('Procesando varios archivos puede tardar más de 30 segundos…', null);
    }, 8000);

    try {
      const res = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        body: fd,
        signal: ctrl.signal,
        credentials: 'omit',
      });
      clearTimeout(slowMsg);

      const text = await res.text();
      let body;
      try {
        body = JSON.parse(text);
      } catch {
        body = { raw: text };
      }

      if (!res.ok) {
        setStatus('Error ' + res.status + ': ' + (body.message || body.error || text.slice(0, 200)), 'error');
        return;
      }

      setStatus('Lote enviado correctamente. Referencia: ' + (body.batch_id || body.batch_http?.batch_id || '—') + '. Revisá tu correo para la aprobación (HITL).', 'ok');
    } catch (err) {
      clearTimeout(slowMsg);
      if (err.name === 'AbortError') {
        setStatus('Solicitud cancelada.', 'error');
      } else if (String(err.message || '').indexOf('fetch') !== -1) {
        setStatus(
          'No se pudo contactar a n8n (red o CORS). En el servidor n8n definí N8N_CORS_ALLOW_ORIGIN con la URL exacta de este sitio (o * para probar) y reiniciá el servicio. Revisá también F12 → Consola / Red.',
          'error'
        );
      } else {
        setStatus('Error: ' + err.message, 'error');
      }
    } finally {
      btn.disabled = false;
      indeterminateProgress(false);
    }
  });
})();
</script>
